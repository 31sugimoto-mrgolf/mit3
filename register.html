<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会員登録 | MRゴルフセンター会員証</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>会員登録</h1>
      <p class="description">初回利用のため、会員情報を登録してください。</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">お名前</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-group">
          <label for="phone">電話番号</label>
          <input type="tel" id="phone" name="phone" placeholder="09012345678" required />
        </div>

        <div class="form-group">
          <label for="birthday">生年月日</label>
          <input type="date" id="birthday" name="birthday" required />
        </div>

        <button type="submit" id="submitButton">登録する</button>
      </form>

      <p id="message" class="message"></p>
    </section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="js/config.js"></script>
  <script src="js/liff-init.js"></script>
  <script src="js/api.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
