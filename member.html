<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会員証 | MRゴルフセンター会員証</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>MRゴルフセンター会員証</h1>
      <p class="description">会員情報を表示しています。</p>

      <div id="memberCard" class="member-card" style="display: none;">
        <div class="member-row">
          <span class="label">会員番号</span>
          <span id="memberNo">-</span>
        </div>

        <div class="member-row">
          <span class="label">お名前</span>
          <span id="memberName">-</span>
        </div>

        <div class="member-row">
          <span class="label">ステータス</span>
          <span id="memberStatus">-</span>
        </div>

        <div class="member-row">
          <span class="label">ランク</span>
          <span id="memberRank">-</span>
        </div>

        <div class="member-row">
          <span class="label">来店回数</span>
          <span id="visitCount">-</span>
        </div>

        <div class="member-row">
          <span class="label">最終来店日</span>
          <span id="lastVisitAt">-</span>
        </div>
      </div>

      <button id="visitButton" type="button">来店する</button>
      <button id="reloadButton" type="button" class="sub-button">更新する</button>

      <p id="message" class="message"></p>
    </section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="js/config.js"></script>
  <script src="js/liff-init.js"></script>
  <script src="js/api.js"></script>
  <script src="js/member.js"></script>
</body>
</html>
